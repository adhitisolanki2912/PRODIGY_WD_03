<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stopwatch</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
        #stopwatch { font-size: 48px; }
        button { font-size: 24px; margin: 10px; }
    </style>
</head>
<body>
    <h1>Stopwatch</h1>
    <div id="stopwatch">00:00:00</div>
    <button id="start">Start</button>
    <button id="stop">Stop</button>
    <button id="reset">Reset</button>

    <script>
        let startTime, updatedTime, difference, t;
        let running = false;

        function startTimer() {
            if (!running) {
                startTime = new Date().getTime();
                running = true;
                t = setInterval(getShowTime, 1);
            }
        }

        function stopTimer() {
            clearInterval(t);
            running = false;
        }

        function resetTimer() {
            clearInterval(t);
            running = false;
            difference = 0;
            document.getElementById('stopwatch').innerHTML = '00:00:00';
        }

        function getShowTime() {
            updatedTime = new Date().getTime();
            difference = updatedTime - startTime;
            let hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            let minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            let seconds = Math.floor((difference % (1000 * 60)) / 1000);
            hours = (hours < 10) ? "0" + hours : hours;
            minutes = (minutes < 10) ? "0" + minutes : minutes;
            seconds = (seconds < 10) ? "0" + seconds : seconds;
            document.getElementById('stopwatch').innerHTML = hours + ":" + minutes + ":" + seconds;
        }

        document.getElementById('start').onclick = startTimer;
        document.getElementById('stop').onclick = stopTimer;
        document.getElementById('reset').onclick = resetTimer;
    </script>
</body>
</html>
